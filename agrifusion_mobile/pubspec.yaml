name: agrifusion_mobile
description: AgroSynapse - Precision Farming Assistant
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  image_picker: ^1.1.2
  mime: ^2.0.0
  http_parser: ^4.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  animate_do: ^3.3.4
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/
